name: Gemini CLI
description: Run Google Gemini CLI AI coding assistant inside Home Assistant to create automations, debug issues, and manage your smart home configuration
version: "0.3.7"
slug: gemini_cli
url: https://github.com/dktzde/ha_gemini_cli
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: true
apparmor: false
full_access: true
host_network: true
docker_api: true
ingress: true
ingress_port: 7681
ingress_stream: true
panel_icon: mdi:google-assistant
panel_title: Gemini CLI
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: manager
map:
  - homeassistant_config:rw
  - ssl:ro
  - share:rw
  - media:rw
  - addon_config:rw
  - backup:ro
options:
  api_key: ""
  model: auto
  yolo_mode: false
  enable_mcp: true
  terminal_font_size: 14
  terminal_theme: dark
  working_directory: /homeassistant
  session_persistence: true
  auto_update_gemini: true
schema:
  api_key: password
  model: list(auto|pro|flash|flash-lite)
  yolo_mode: bool
  enable_mcp: bool
  terminal_font_size: int(10,24)
  terminal_theme: list(dark|light)
  working_directory: str
  session_persistence: bool
  auto_update_gemini: bool
environment:
  TERM: xterm-256color
